name: Parallel and Dependent Jobs Workflow

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  job1:
    name: Job 1
    runs-on: ubuntu-latest
    steps:
      - name: Print Job 1 Completed
        run: echo "Job 1 completed"

  job2:
    name: Job 2
    runs-on: ubuntu-latest
    steps:
      - name: Print Job 2 Completed
        run: echo "Job 2 completed"

  job3:
    name: Job 3
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: Print Job 3 Completed
        run: echo "Job 3 completed"
